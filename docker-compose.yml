services:
  backend:
    build: .
    container_name: air-quality-backend
    ports:
      # host:container — ESP32 và dashboard kết nối qua port 8000 của máy host
      - "8000:8000"
    volumes:
      # Mount thư mục data ra ngoài để SQLite không bị mất khi restart container
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
